# ============================================================
# MMOnsterpatch Official Server - World Config
# Single Realm Layout
# ============================================================
# Rate format matches WoW-style world config values:
#   1   = official/default rate
#   2   = double rate
#   0.5 = half rate
#
# Important v0.9.2 note:
# - These rates are server-owned while a player is connected to Official Online Mode.
# - Offline/local play uses the client/game defaults and ignores this file.
# ============================================================

[Realm]
RealmName = Goose Official
RealmType = Official
RealmEnabled = 1

[Network]
Host = 0.0.0.0
MMO Port = 61528
Social Port = 61529
Trading Post Port = 61526
Steam OpenID HTTP Host = 0.0.0.0
Steam OpenID HTTP Port = 61527
Steam OpenID Public Base URL = https://mon-auth.gamingwithgoose.com
Steam OpenID Realm = https://mon-auth.gamingwithgoose.com
# Leave blank to use the STEAM_WEB_API_KEY Windows environment variable.
Steam Web API Key =

[Paths]
Social Database = data/social.db
Chat Logs = data/chat_logs
User Reports = data/user_reports
Archived Characters = data/Archived Characters

[Performance]
# World/player snapshot send rate. Public default can be lowered to 10 or 15 later.
Snapshot Hz = 30
# 0 keeps current blocking socket behavior. Future safe value: 60.
Socket Idle Timeout Seconds = 0

[Auth]
# Cached Official/AIO session token lifetime.
AIO Session Hours = 12
# 1 = cached session token only works from the public IP that created it.
Require Same IP For Session = 1

[Rates]
# Online-only game rates. 1 = default, 2 = double, 0 = disabled where applicable.
# Shiny odds are denominator-style: 1000 = 1/1000, 500 = 1/500, 100 = 1/100, 1 = guaranteed shiny.
EXP Rate = 1
SATS Rate = 1
Shiny Odds Denominator = 1000
Catch Rate = 1
# Item Drop Chance Rate multiplies the chance of an item drop; it does not change drop quantity.
Item Drop Chance Rate = 1
Random Encounter Rate = 1

# Vanilla visible spawn chance is 25%; Visible Spawn Rate 2 = 50% chance per empty deduped spawn tile.
# Official server-owned overworld spawns skip version-exclusive encounter entries.
Visible Spawn Rate = 2
Reward Spawn Rate = 1
RP Gain Rate = 1
RP Loss Rate = 1
Season Reward Rate = 1

[Overworld Spawns]
Visible Spawns Enabled = 1
Visible Spawn Base Chance Percent = 25
Visible Spawn Topup Seconds = 120
No Player Despawn Seconds = 60
Max Reported Spawn Zones = 128
Pending Spawn Request Timeout Seconds = 12

[Ranked]
Ranked Enabled = 0
RP Writes Enabled = 0
Starting RP = 0
Max RP = 1000
Required Ranked Mons = 4
Minimum Ranked Level = 50
Rank Gap Limit = 2
